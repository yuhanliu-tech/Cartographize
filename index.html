<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographize - Satellite Terrain Segmentation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cartographize</h1>
        <p class="subtitle">Satellite Image Terrain Segmentation</p>
        
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" />
            <label for="imageInput" class="upload-btn">Upload Satellite Image</label>
        </div>
        
        <div class="controls-section">
            <div class="control-group">
                <label for="segmentationMode">Segmentation Mode:</label>
                <select id="segmentationMode">
                    <option value="original">Original Image</option>
                    <option value="segmented" selected>Terrain Segmentation</option>
                    <option value="overlay">Overlay Mode</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="sensitivity">Detection Sensitivity:</label>
                <input type="range" id="sensitivity" min="0.1" max="2.0" step="0.1" value="1.0">
                <span id="sensitivityValue">1.0</span>
            </div>
            
            <button id="processBtn" class="process-btn">Process Image</button>
        </div>
        
        <div class="canvas-container">
            <canvas id="glCanvas" width="800" height="600"></canvas>
        </div>
        
        <div class="legend">
            <div class="legend-item"><span class="color-box water"></span> Water/Rivers/Lakes</div>
            <div class="legend-item"><span class="color-box forest"></span> Forests/Meadows</div>
            <div class="legend-item"><span class="color-box city"></span> Cities/Towns</div>
            <div class="legend-item"><span class="color-box mountain"></span> Mountains</div>
            <div class="legend-item"><span class="color-box desert"></span> Deserts</div>
        </div>
        
        <div class="instructions">
            <p>Upload a Google Maps satellite image to automatically segment terrain features</p>
            <p>The algorithm will identify and color-code different geographical elements</p>
        </div>
    </div>
    
    <script src="webgl-app.js"></script>
</body>
</html>
